<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Punch Smash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone-shell">

  <!-- Fade overlay for screen transitions -->
  <div class="fade-overlay" id="fadeOverlay"></div>

  <!-- ══════════════════════════════════════
       SPLASH SCREEN
  ══════════════════════════════════════ -->
  <div class="screen active" id="splash">
    <img class="bg" src="assets/bg-splash.png" alt="Splash Background">

    <div class="mascot-wrap">
      <img src="assets/mascot.png" alt="Punch Smash Mascot">
    </div>

    <div class="loading-section">
      <div class="loading-label" id="loadingText">LOADING...</div>
      <div class="bar-outer">
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       HOMEPAGE
  ══════════════════════════════════════ -->
  <div class="screen" id="home">
    <img class="bg" src="assets/bg-home.png" alt="Home Background">

    <!-- Top bar: Settings + Coin -->
    <div class="top-bar">
      <div class="icon-btn" id="btnSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <div class="coin-pill">
        <div class="coin-icon">⭐</div>
        <span class="coin-count" id="coinCount">0</span>
      </div>
    </div>

    <!-- Mascot -->
    <div class="mascot-home">
      <img src="assets/mascot.png" alt="Punch Smash Mascot">
    </div>

    <!-- Play button -->
    <div class="btn-play" id="btnPlay">
      <img src="assets/btn-play.png" alt="Mulai Main">
    </div>

    <!-- Bottom action buttons -->
    <div class="bottom-actions">
      <div class="action-btn" id="btnSamsak">
        <img src="assets/btn-samsak.png" alt="Samsak">
      </div>
      <div class="action-btn" id="btnSarung">
        <img src="assets/btn-sarung.png" alt="Sarung Tinju">
      </div>
      <div class="action-btn" id="btnBg">
        <img src="assets/btn-bg.png" alt="Background">
      </div>
    </div>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
