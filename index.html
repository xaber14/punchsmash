<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Punch Smash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone-shell">

  <!-- Fade overlay for screen transitions -->
  <div class="fade-overlay" id="fadeOverlay"></div>

  <!-- ══════════════════════════════════════
       SPLASH SCREEN
  ══════════════════════════════════════ -->
  <div class="screen active" id="splash">
    <img class="bg" src="assets/bg-splash.png" alt="Splash Background">
    <div class="mascot-wrap">
      <img src="assets/mascot.png" alt="Punch Smash Mascot">
    </div>
    <div class="loading-section">
      <div class="loading-label" id="loadingText">LOADING...</div>
      <div class="bar-outer">
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       HOMEPAGE
  ══════════════════════════════════════ -->
  <div class="screen" id="home">
    <img class="bg" src="assets/bg-home.png" alt="Home Background">

    <!-- Samsak (pendulum pivot from top) -->
    <div class="samsak-anchor">
      <div class="samsak-wrap">
        <img src="assets/samsak.png" id="samsakImg" alt="Samsak Tinju">
      </div>
      <!-- Photo sticker sticks to samsak body -->
      <div class="samsak-sticker" id="samsakSticker">
        <div class="tape tape-tl"></div>
        <div class="tape tape-tr"></div>
        <div class="tape tape-bl"></div>
        <div class="tape tape-br"></div>
        <div class="photo-frame">
          <img id="stickerImg" src="" alt="Foto">
        </div>
        <button class="sticker-remove" id="stickerRemove">✕</button>
      </div>
    </div>

    <!-- Play button -->
    <div class="btn-play" id="btnPlay">
      <img src="assets/btn-play.png" alt="Mulai Main">
    </div>

    <!-- Bottom action buttons -->
    <div class="bottom-actions">
      <div class="action-btn" id="btnSamsak">
        <img src="assets/btn-samsak.png" alt="Samsak">
      </div>
      <div class="action-btn" id="btnSarung">
        <img src="assets/btn-sarung.png" alt="Sarung Tinju">
      </div>
      <!-- Tambah Foto — CSS button replacing bg asset -->
      <div class="action-btn" id="btnTambahFoto">
        <div class="btn-tambah-foto">
          <div class="btn-tf-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="10" width="32" height="22" rx="3" fill="#4aaef5" stroke="#2080cc" stroke-width="1.5"/>
              <circle cx="14" cy="19" r="4" fill="#ffe566"/>
              <path d="M4 26 l9-8 7 6 5-4 11 8" fill="#3db56e" stroke="none"/>
              <path d="M4 26 l9-8 7 6 5-4 11 8 V32 H4Z" fill="#3db56e"/>
              <circle cx="31" cy="10" r="7" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
              <path d="M31 6.5 V13.5 M27.5 10 H34.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="btn-tf-label">TAMBAH<br>FOTO</span>
        </div>
      </div>
    </div>

    <!-- Sheet overlay backdrop -->
    <div class="sheet-overlay" id="sheetOverlay"></div>

    <!-- ── Samsak Color Sheet ── -->
    <div class="bottom-sheet" id="sheetSamsak">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Pilih Warna Samsak</div>
      <div class="color-grid" id="samsakColorGrid"></div>
    </div>

    <!-- ── Sarung Tinju Color Sheet ── -->
    <div class="bottom-sheet" id="sheetSarung">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Pilih Warna Sarung Tinju</div>
      <div class="color-grid" id="sarungColorGrid"></div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="photoInput" accept="image/*">
  </div>

  <!-- ══════════════════════════════════════
       GAMEPLAY SCREEN
  ══════════════════════════════════════ -->
  <div class="screen" id="game">
    <img class="bg" src="assets/bg-home.png" alt="Gym Background">
    <div class="game-vignette"></div>

    <!-- Back button (top-left) -->
    <div class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 5l-7 7 7 7"/>
      </svg>
    </div>

    <!-- Combo indicator -->
    <div class="combo-display" id="comboDisplay">
      <span class="combo-word">COMBO!</span>
      <span class="combo-mult" id="comboMult">x2</span>
    </div>

    <!-- ── Samsak (target) ── -->
    <div class="game-samsak-anchor" id="gameSamsakAnchor">
      <div class="game-samsak-wrap" id="gameSamsakWrap">
        <img src="assets/samsak.png" id="gameSamsakImg" alt="Samsak">
      </div>
      <!-- Photo sticker (carried over if user added one) -->
      <div class="game-sticker" id="gameSticker" style="display:none">
        <div class="tape tape-tl"></div>
        <div class="tape tape-tr"></div>
        <div class="tape tape-bl"></div>
        <div class="tape tape-br"></div>
        <div class="photo-frame"><img id="gameStickerImg" src="" alt=""></div>
      </div>
    </div>

    <!-- Hit feedback text layer -->
    <div class="hit-text-layer" id="hitTextLayer"></div>

    <!-- ── Two gloves (FPS, alternating) ── -->
    <div class="glove-left" id="gloveLeft">
      <img src="assets/glove-left.png" alt="Left Glove">
    </div>
    <div class="glove-right" id="gloveRight">
      <img src="assets/glove-right.png" alt="Right Glove">
    </div>

    <!-- ── PUKUL button ── -->
    <div class="btn-pukul" id="btnPukul">
      <span>PUKUL</span>
    </div>
  </div>

</div>

<script src="sfx.js"></script>
<script src="main.js"></script>
<script src="gameplay.js"></script>
</body>
</html>
